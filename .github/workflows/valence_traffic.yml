name: Valence Traffic Monitoring

on:
  schedule:
    - cron: "42 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: valence-traffic
  cancel-in-progress: false

jobs:
  valence-traffic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4
          python -m playwright install chromium

      - name: Run Valence traffic monitoring
        run: python valence_traffic.py
        env:
          REQUEA_CONFIG: ${{ secrets.REQUEA_CONFIG }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
